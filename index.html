<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minecraft Crazygames</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb;
    font-family: 'Segoe UI', system-ui, sans-serif; -webkit-user-select: none; user-select: none; }
  #game { display: block; width: 100vw; height: 100vh; cursor: crosshair; image-rendering: pixelated; }
  #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  #crosshair { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    color: #fff; font-size: 26px; line-height: 1; mix-blend-mode: difference; text-shadow: 0 0 2px #000; }

  #hotbar { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
    display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,0.35); border: 2px solid rgba(0,0,0,0.5); border-radius: 6px; }
  .slot { position: relative; width: 52px; height: 52px; background: rgba(255,255,255,0.08); border: 2px solid rgba(0,0,0,0.4);
    border-radius: 4px; display: flex; align-items: center; justify-content: center; image-rendering: pixelated; }
  #hotbar .slot { width: 52px; height: 52px; }
  .slot.selected { border-color: #fff; box-shadow: 0 0 0 2px #fff, 0 0 8px rgba(255,255,255,0.5); }
  .slot canvas { image-rendering: pixelated; }
  .slot .count { position: absolute; right: 2px; bottom: 0; font: bold 13px/1 monospace; color: #fff;
    text-shadow: 1px 1px 0 #000, -1px 1px 0 #000; pointer-events: none; }
  .slot .durability { position: absolute; left: 3px; right: 3px; bottom: 2px; height: 3px; background: #000; }
  .slot .durability div { height: 100%; }

  #bars { position: absolute; left: 50%; bottom: 78px; transform: translateX(-50%);
    display: none; flex-direction: column; gap: 1px; align-items: center; }
  .bar { font-size: 15px; letter-spacing: 0px; text-shadow: 0 0 3px #000, 1px 1px 0 #000; }
  .bar .hp { color: #ff3b3b; } .bar .hp-empty { color: #5a1414; }
  .bar .hg { } .bar .hg-empty { color: #5a4a20; }
  .bar.air { color: #cdeeff; }

  #debug { position: absolute; left: 8px; top: 8px; color: #fff; background: rgba(0,0,0,0.5);
    padding: 8px 10px; border-radius: 4px; font: 12px/1.5 monospace; white-space: nowrap; }

  #hint { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    color: #fff; background: rgba(0,0,0,0.6); padding: 14px 22px; border-radius: 8px; text-align: center;
    font-size: 15px; max-width: 80vw; line-height: 1.5; }

  #toast { position: absolute; right: 12px; top: 12px; z-index: 25; color: #fff;
    background: rgba(20,120,40,0.85); padding: 8px 14px; border-radius: 6px; font: 14px/1 sans-serif;
    transition: opacity 0.4s; pointer-events: none; }

  #death { position: absolute; inset: 0; z-index: 30; display: none; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(140,0,0,0.45); color: #fff; text-align: center; }
  #death h1 { font-size: 46px; margin-bottom: 8px; text-shadow: 2px 2px 0 #000; }

  #screen { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); pointer-events: auto; z-index: 20; }
  .panel { background: #c6c6c6; border: 4px solid #555; border-radius: 6px; padding: 14px 16px;
    max-width: 92vw; max-height: 88vh; overflow: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
  .panel-title { font-size: 14px; color: #222; margin-bottom: 10px; font-weight: 700; }
  .grid { display: grid; gap: 3px; }
  #screen .slot { width: 46px; height: 46px; background: #8b8b8b; border: 2px solid #373737; border-radius: 0; cursor: pointer; }
  #screen .slot:hover { background: #a8a8a8; }
  #screen .slot.small { width: 42px; height: 42px; }
  .craft-section, .furnace-section { display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 2px solid #999; }
  .furnace-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .arrow { font-size: 26px; color: #555; }
  .flame { font-size: 18px; } .flame::before { content: '🔥'; }
  .inv-section { margin-top: 6px; }
  .hotbar-row { padding-top: 4px; border-top: 2px solid #999; }
  #cursor-item { position: fixed; z-index: 40; width: 40px; height: 40px; pointer-events: none;
    transform: translate(-20px, -20px); image-rendering: pixelated; }
  #cursor-item .count { position: absolute; right: 0; bottom: -2px; font: bold 13px/1 monospace; color: #fff;
    text-shadow: 1px 1px 0 #000; }

  /* touch controls */
  .tc-root { position: absolute; inset: 0; z-index: 15; pointer-events: none; }
  .tc-look { position: absolute; right: 0; top: 0; width: 60%; height: 100%; pointer-events: auto; }
  .tc-joy { position: absolute; left: 24px; bottom: 90px; width: 130px; height: 130px;
    border-radius: 50%; background: rgba(255,255,255,0.14); border: 2px solid rgba(255,255,255,0.3);
    pointer-events: auto; touch-action: none; }
  .tc-knob { position: absolute; left: 50%; top: 50%; width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,255,255,0.4); transform: translate(-50%, -50%); }
  .tc-btns { position: absolute; right: 20px; bottom: 90px; display: flex; gap: 12px; align-items: flex-end; pointer-events: none; }
  .tc-util { position: absolute; right: 12px; top: 12px; display: flex; gap: 10px; pointer-events: none; }
  .tc-btn { width: 66px; height: 66px; border-radius: 50%; background: rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.4); color: #fff; font-size: 26px; display: flex;
    align-items: center; justify-content: center; pointer-events: auto; touch-action: none; user-select: none; }
  .tc-btn.tc-small { width: 48px; height: 48px; font-size: 20px; }
  .tc-btn:active { background: rgba(255,255,255,0.3); }

  #loading { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: #1a1a2e; color: #fff; text-align: center; padding: 20px; }
  #loading h1 { font-size: 28px; margin-bottom: 10px; }
  #loading p { opacity: 0.8; max-width: 540px; line-height: 1.5; }
  .spinner { width: 42px; height: 42px; border: 4px solid rgba(255,255,255,0.2); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 18px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui"></div>
  <div id="loading">
    <div class="spinner"></div>
    <h1>Minecraft Crazygames</h1>
    <p>Generating world… click the screen once it loads to lock the mouse and play.</p>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
