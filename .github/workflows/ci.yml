name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax check all modules
        run: |
          for f in src/*.js tools/*.mjs tools/*.js; do node --check "$f"; done
      - name: Headless engine + UI tests
        run: npm test
